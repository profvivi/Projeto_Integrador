<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Integrador</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>



<body>

    <!-- Links de salto: essencial para leitores de tela e navegação por teclado -->
    <a href="#conteudo-principal" class="links-salto">Pular para o conteúdo principal</a>

    <header class="cabecalho-principal">
        <div class="container">
            
            <!-- Barra de Acessibilidade (Fica no topo absoluto) -->
            <div class="barra-acessibilidade" role="toolbar" aria-label="Ferramentas de acessibilidade">
                <div class="controles-fonte">
                    <button id="btn-diminuir" aria-label="Diminuir tamanho do texto">A-</button>
                    <button id="btn-normal" aria-label="Restaurar tamanho do texto padrão">A</button>
                    <button id="btn-aumentar" aria-label="Aumentar tamanho do texto">A+</button>
                </div>
                <button id="btn-contraste" aria-label="Alternar alto contraste">🌓 Alto Contraste</button>
            </div>

            <!-- Identificação / Logotipo -->
            <div class="logo">
                <a href="#" aria-label="Projeto Integrador">
                    <span aria-hidden="true">🔹</span> Projeto Integrador
                </a>
            </div>

            <!-- Botão do menu responsivo (Apenas para telas pequenas) -->
            <button class="menu-toggle" aria-expanded="false" aria-controls="menu-navegacao" aria-label="Abrir menu de navegação">
                <span class="icone-menu" aria-hidden="true">≡</span>
            </button>

            <!-- Menu de navegação principal -->
            <nav id="menu-navegacao" class="menu-nav" aria-label="Menu principal">
                <ul>
                    <li><a href="#" aria-current="page">Início</a></li>
                    <li><a href="#">Sobre Nós</a></li>
                    <li><a href="#">Serviços</a></li>
                    <li><a href="#">Contato</a></li>
                </ul>
            </nav>

        </div>
    </header>

    <!-- Marcação do início do conteúdo da página -->
    <main id="conteudo-principal" tabindex="-1">
        <div style="padding: 2rem; max-width: 1200px; margin: 0 auto;">
            <h1>Conteúdo Principal</h1>
            <p>Este é um exemplo de texto para testar o zoom da tela e o contraste.</p>
        </div>
    </main>

  


    <script src="main.js"></script>
</body>
</html>
