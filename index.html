<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Integrador</title>
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>

body>

    <a href="#conteudo-principal" class="skip-link">Ir para o conteúdo principal</a>

    <header class="accessible-header" role="banner">
        <div class="logo">
            <a href="#" aria-label="Página inicial do site">MeuSiteAcessível</a>
        </div>
        
        <!-- Botão Hambúrguer: invisível no desktop, visível no mobile -->
        <button class="hamburger-btn" id="hamburgerBtn" aria-label="Abrir menu de navegação" aria-expanded="false" aria-controls="navMenu">
            <span class="hamburger-icon" aria-hidden="true"></span>
        </button>

        <nav class="nav-menu" id="navMenu" role="navigation" aria-label="Menu Principal">
            <ul>
                <li><a href="#">Início</a></li>
                
                <!-- Item com Menu Suspenso (Dropdown) -->
                <li class="dropdown">
                    <button class="dropdown-btn" id="dropdownBtn" aria-haspopup="true" aria-expanded="false" aria-controls="dropdownMenu">
                        Produtos <span class="arrow" aria-hidden="true">▼</span>
                    </button>
                    <ul class="dropdown-content" id="dropdownMenu" role="menu" aria-labelledby="dropdownBtn">
                        <li role="none"><a href="#" role="menuitem">Software</a></li>
                        <li role="none"><a href="#" role="menuitem">Hardware</a></li>
                        <li role="none"><a href="#" role="menuitem">Serviços</a></li>
                    </ul>
                </li>

                <li><a href="#">Sobre Nós</a></li>
                <li><a href="#">Contato</a></li>
            </ul>
        </nav>

        <button class="voice-btn" id="voiceBtn" aria-label="Ativar navegação por comando de voz">
            🎙️ Ouvir Comando
        </button>
    </header>

    <div id="statusAlert" class="status-alert" role="alert" aria-live="polite"></div>

    <main id="conteudo-principal">
        <h1>Conteúdo Principal</h1>
        <p>Use a tecla TAB para testar a navegação. No celular, o menu vira hambúrguer.</p>
    </main>

    <!-- Vinculação do arquivo JavaScript externo -->
    <script src="script.js"></script>
</body>
</html>
